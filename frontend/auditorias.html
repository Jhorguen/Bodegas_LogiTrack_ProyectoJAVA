<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack - Auditorias</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>LogiTrack</h2>
                <small>Gestion de Bodegas</small>
            </div>
            <div class="user-info">
                Bienvenido, <strong id="userDisplay"></strong>
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html"><span>📊</span> Dashboard</a>
                <a href="bodegas.html"><span>🏭</span> Bodegas</a>
                <a href="productos.html"><span>📦</span> Productos</a>
                <a href="movimientos.html"><span>🔄</span> Movimientos</a>
                <a href="auditorias.html" class="active"><span>📋</span> Auditorias</a>
            </div>
            <div class="sidebar-footer">
                <a href="#" onclick="logout()">Cerrar Sesion</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h1>Registro de Auditorias</h1>
            </div>

            <div id="alert" class="alert"></div>

            <!-- Filtros -->
            <div class="filters">
                <div class="form-group">
                    <label>Filtrar por Usuario</label>
                    <input type="text" id="filtroUsuario" placeholder="Nombre de usuario">
                </div>
                <div class="form-group">
                    <label>Filtrar por Tipo</label>
                    <select id="filtroTipo">
                        <option value="">Todos</option>
                        <option value="INSERT">INSERT</option>
                        <option value="UPDATE">UPDATE</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="filtrar()">Filtrar</button>
                <button class="btn btn-warning" onclick="cargarAuditorias()">Ver Todas</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Operacion</th>
                            <th>Fecha y Hora</th>
                            <th>Usuario</th>
                            <th>Entidad</th>
                            <th>Valores Anteriores</th>
                            <th>Valores Nuevos</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAuditorias">
                        <tr><td colspan="7" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        verificarAuth();
        document.getElementById('userDisplay').textContent = getUsuario();

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 4000);
        }

        async function cargarAuditorias() {
            try {
                const auditorias = await obtenerAuditorias();
                renderAuditorias(auditorias);
            } catch (e) {
                console.error('Error:', e);
            }
        }

        async function filtrar() {
            const usuario = document.getElementById('filtroUsuario').value;
            const tipo = document.getElementById('filtroTipo').value;

            try {
                let auditorias;
                if (usuario) {
                    auditorias = await obtenerAuditoriasPorUsuario(usuario);
                } else if (tipo) {
                    auditorias = await obtenerAuditoriasPorTipo(tipo);
                } else {
                    auditorias = await obtenerAuditorias();
                }
                renderAuditorias(auditorias);
            } catch (e) {
                showAlert('Error al filtrar', 'error');
            }
        }

        function formatJson(str) {
            if (!str) return '-';
            try {
                const obj = JSON.parse(str);
                return Object.entries(obj).map(([k, v]) => k + ': ' + v).join(', ');
            } catch (e) {
                return str;
            }
        }

        function renderAuditorias(auditorias) {
            const tbody = document.getElementById('tablaAuditorias');

            if (auditorias.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay registros de auditoria</td></tr>';
                return;
            }

            tbody.innerHTML = auditorias.map(a => `
                <tr>
                    <td>${a.id}</td>
                    <td><span class="badge badge-${a.tipoOperacion.toLowerCase()}">${a.tipoOperacion}</span></td>
                    <td>${new Date(a.fechaHora).toLocaleString()}</td>
                    <td>${a.usuario}</td>
                    <td>${a.entidadAfectada}</td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;">${formatJson(a.valoresAnteriores)}</td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;">${formatJson(a.valoresNuevos)}</td>
                </tr>
            `).join('');
        }

        cargarAuditorias();
    </script>
</body>
</html>
